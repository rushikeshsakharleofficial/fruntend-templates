name: Daily Template Discovery

on:
  schedule:
    - cron: "0 0 * * *"
      timezone: "Asia/Kolkata"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-template-discovery-main
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Discover templates
        run: npm run discover

      - name: Commit updates to main
        run: |
          git config user.name "frontend-template-bot"
          git config user.email "frontend-template-bot@users.noreply.github.com"
          git add registry templates ui design-md prompts collectors
          git commit -m "chore: daily frontend template discovery" || exit 0
          git push origin main
